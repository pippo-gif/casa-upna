name: 🏠 CasaUPNA · Aggiornamento giornaliero

on:
  schedule:
    # 07:00 UTC = 09:00 ora italiana (CEST)
    # Eseguiamo anche a 08:00 UTC come backup se GitHub ritarda
    - cron: '0 7 * * *'
    - cron: '0 8 * * *'
  workflow_dispatch:   # run manuale dal sito GitHub in qualsiasi momento

# Evita run paralleli: se il primo slot ritarda e si sovrappone al backup, cancella il vecchio
concurrency:
  group: daily-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    name: Scansione alloggi UPNA
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔍 Esegui scansione e aggiorna app.js
        run: python updater.py

      - name: 📝 Commit e push se ci sono modifiche
        run: |
          git config user.name  "CasaUPNA Bot"
          git config user.email "casaupna-bot@noreply.github.com"
          git add app.js updates_data.json updater.log || true
          git diff --staged --quiet || git commit -m "🏠 Aggiornamento $(date +'%d/%m/%Y %H:%M UTC')"
          git push || true
